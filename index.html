<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>新手上厨</title>
<style>
  :root {
    --ink: #3e2723;
    --paper: #fff8ec;
    --accent: #ff7043;
    --accent-2: #ffb300;
    --good: #66bb6a;
    --bad: #ef5350;
    --hud-surface-alpha: .82;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
    background: #2b1d16; color: var(--ink);
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  #app {
    position: fixed; inset: 0;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    overscroll-behavior: none;
  }
  #app.gesture-locked { touch-action: none; }
  #scene-host, #scene-host canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }
  .hidden { display: none !important; }

  /* ---------- HUD ---------- */
  #hud { position: absolute; inset: 0; pointer-events: none; }
  #hud-tl {
    position: absolute; top: calc(10px + env(safe-area-inset-top, 0px)); left: calc(10px + env(safe-area-inset-left, 0px));
    display: grid; gap: 4px; width: max-content; max-width: calc(100vw - 20px);
    padding: 7px 10px 6px; border: 3px solid var(--ink); border-radius: 14px;
    background: linear-gradient(160deg, rgb(255 253 244 / var(--hud-surface-alpha)), rgb(255 232 190 / var(--hud-surface-alpha)));
    box-shadow: 0 4px 0 rgba(38,23,18,.42), inset 0 1px 0 rgba(255,255,255,.7);
    backdrop-filter: blur(2px);
  }
  .chip {
    background: rgb(255 248 236 / var(--hud-surface-alpha)); border: 3px solid var(--ink); border-radius: 14px;
    padding: 5px 14px; font-weight: 800; font-size: 17px; box-shadow: 0 3px 0 rgba(0,0,0,.35);
    display: inline-flex; align-items: center; gap: 8px; width: max-content;
  }
  #hud-primary { display: grid; grid-template-columns: auto 2px auto; align-items: center; gap: 10px; }
  #time-chip, #score-chip { display: inline-flex; align-items: center; gap: 7px; font-weight: 900; line-height: 1; white-space: nowrap; }
  #time-chip { font-size: 20px; }
  #score-chip { justify-content: end; font-size: 19px; }
  .hud-divider { width: 2px; height: 24px; border-radius: 2px; background: rgba(75,47,39,.28); }
  #time-chip.low { color: var(--bad); animation: pulse .6s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  #hud-sub { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 750; white-space: nowrap; }
  #round-chip { font-weight: 900; }
  #rage-chip { color: #b72828; font-weight: 900; }
  .hud-separator { color: rgba(75,47,39,.42); font-weight: 900; }

  #orders {
    position: absolute; top: calc(10px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; max-width: min(72vw, 640px); justify-content: center; flex-wrap: nowrap; overflow: hidden;
  }
  .order-card {
    background: rgb(255 248 236 / var(--hud-surface-alpha)); border: 3px solid var(--ink); border-radius: 14px;
    padding: 4px 8px 6px; min-width: 108px; box-shadow: 0 3px 0 rgba(0,0,0,.35);
    animation: pop-in .18s ease-out;
  }
  @keyframes pop-in { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .order-card .o-dots { display: flex; align-items: center; gap: 4px; margin: 0; }
  .order-card .o-dots i {
    width: 24px; height: 22px;
    display: grid; place-items: center; color: #fff; font-size: 11px; font-style: normal; font-weight: 900;
    line-height: 1; text-shadow: 0 1px 1px rgba(0,0,0,.95), 1px 0 1px rgba(0,0,0,.7), -1px 0 1px rgba(0,0,0,.7);
    position: relative; isolation: isolate;
  }
  .order-card .o-dots i::before, .order-card .o-dots i::after {
    content: ''; position: absolute; inset-block: 0; z-index: -1;
    background: var(--ingredient, #999); border: 2px solid rgba(38,23,18,.62);
    box-shadow: inset -2px -2px 0 rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.2);
  }
  .order-card .o-dots i.whole::before { inset-inline: 1px; border-radius: 50%; }
  .order-card .o-dots i.whole::after { display: none; }
  .order-card .o-dots i.chopped::before, .order-card .o-dots i.chopped::after {
    inset: 1px; border: 0; border-radius: 50%;
    filter: drop-shadow(0 0 1.2px rgba(38,23,18,.95));
  }
  .order-card .o-dots i.chopped::before {
    clip-path: polygon(0 0, 65% 0, 25% 100%, 0 100%);
    transform: translate(-1px, -1px);
  }
  .order-card .o-dots i.chopped::after {
    clip-path: polygon(75% 0, 100% 0, 100% 100%, 35% 100%);
    transform: translate(1px, 1px);
  }
  .order-card .o-dots i span { position: relative; z-index: 1; transform: translateY(.25px); }
  .order-card .o-bar { position: absolute; inset: auto 0 0; height: 4px; background: rgba(185,171,148,.72); overflow: hidden; }
  .order-card .o-bar i { display: block; height: 100%; background: var(--good); }
  .order-card.urgent { border-color: var(--bad); }
  .order-card.urgent .o-bar i { background: var(--bad); }

  #hud-status {
    position: absolute; top: calc(70px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px; max-width: min(72vw, 640px);
  }
  #hud-status .chip { position: static; transform: none; padding: 3px 9px; border-width: 2px; border-radius: 10px; font-size: 12px; line-height: 1.25; }
  #event-chip { background: rgb(150 35 20 / var(--hud-surface-alpha)); color: #fff4d0; border-color: #ffb02e; }

  #carry-chip {
    position: absolute; bottom: calc(14px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%);
    font-size: 15px;
  }
  #hint {
    position: absolute; bottom: calc(14px + env(safe-area-inset-bottom, 0px)); left: calc(10px + env(safe-area-inset-left, 0px));
    font-size: 12px; font-weight: 700; color: #fff8ec; text-shadow: 0 1px 3px rgba(0,0,0,.6);
    background: rgba(62,39,35,.55); padding: 6px 10px; border-radius: 10px; line-height: 1.6;
  }
  #audio-toggle {
    position: absolute; z-index: 20;
    top: calc(10px + env(safe-area-inset-top, 0px)); right: calc(10px + env(safe-area-inset-right, 0px));
    width: 38px; height: 38px; padding: 0; border: 3px solid var(--ink); border-radius: 12px;
    background: rgb(255 248 236 / var(--hud-surface-alpha)); box-shadow: 0 3px 0 rgba(0,0,0,.35);
    color: var(--ink); font-size: 18px; cursor: pointer; pointer-events: auto;
  }
  #audio-toggle:hover { transform: translateY(-2px); }
  #audio-toggle:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  #audio-toggle:focus-visible { outline: 3px solid var(--accent-2); outline-offset: 3px; }
  #audio-toggle.muted { opacity: .72; }

  /* ---------- 倒计时 ---------- */
  #countdown {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  #countdown span {
    font-size: clamp(90px, 22vw, 200px); font-weight: 900; color: #fff;
    text-shadow: 0 8px 0 rgba(0,0,0,.3), 0 0 40px rgba(255,150,50,.8);
    animation: cd-pop .9s ease-out infinite;
  }
  @keyframes cd-pop { 0% { transform: scale(1.6); opacity: 0; } 20% { transform: scale(1); opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }

  /* ---------- 覆盖层（大厅/结算） ---------- */
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(43, 29, 22, .78); backdrop-filter: blur(6px); padding: 20px; overflow-y: auto;
    touch-action: pan-y; overscroll-behavior: contain;
  }
  .panel {
    background: var(--paper); border: 4px solid var(--ink); border-radius: 22px;
    box-shadow: 0 8px 0 rgba(0,0,0,.4); padding: 26px 30px; max-width: min(92vw, 620px); width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .panel h1 { margin: 0; font-size: clamp(26px, 5vw, 38px); font-weight: 900; letter-spacing: 2px; }
  .panel h1 .flame { color: var(--accent); }
  .panel h2 { margin: 0; font-size: 26px; font-weight: 900; }
  .sub { color: #8d6e63; font-weight: 700; font-size: 13px; margin-top: -8px; }

  #map-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .map-card {
    border: 3px solid var(--ink); border-radius: 16px; background: #fff; padding: 12px 14px;
    width: 160px; cursor: pointer; transition: transform .12s, box-shadow .12s; text-align: left;
    font-family: inherit;
  }
  .map-card:hover { transform: translateY(-3px); }
  .map-card.sel { background: #ffe0b2; box-shadow: 0 5px 0 rgba(0,0,0,.3); border-color: var(--accent); }
  .map-card.locked { cursor: default; opacity: .92; }
  .map-card .m-name { font-weight: 900; font-size: 16px; }
  .map-card .m-desc { font-size: 12px; color: #795548; margin-top: 5px; line-height: 1.5; }
  .map-card .m-ico { font-size: 24px; }

  #lobby-players { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 34px; }
  .p-row {
    display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 2px solid var(--ink);
    border-radius: 999px; padding: 5px 13px; font-weight: 800; font-size: 14px;
  }
  .p-row i { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(0,0,0,.25); display: block; }
  .p-row .crown { font-size: 12px; }

  .big-btn {
    font-family: inherit; font-size: 19px; font-weight: 900; letter-spacing: 3px;
    background: var(--accent); color: #fff; border: 3px solid var(--ink); border-radius: 16px;
    padding: 13px 44px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,.35); transition: transform .1s;
  }
  .big-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .big-btn:disabled { opacity: .45; cursor: not-allowed; }
  .ghost-btn {
    font-family: inherit; font-size: 15px; font-weight: 800; background: #fff; color: var(--ink);
    border: 3px solid var(--ink); border-radius: 14px; padding: 9px 26px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,.3);
  }
  .note { font-size: 13px; font-weight: 700; color: #8d6e63; min-height: 18px; }

  #end-stats { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .stat {
    background: #fff; border: 3px solid var(--ink); border-radius: 14px; padding: 10px 18px; text-align: center;
  }
  .stat .v { font-size: 26px; font-weight: 900; }
  .stat .k { font-size: 12px; font-weight: 700; color: #8d6e63; }
  .stat.hero .v { color: var(--accent); font-size: 34px; }
  #end-btns { display: flex; gap: 12px; }
  #round-result .panel { max-width: 560px; }
  #round-board, #award-board { width: 100%; display: grid; gap: 7px; }
  .rank-row { display: grid; grid-template-columns: 34px 1fr auto; gap: 9px; align-items: center; background: rgba(255,255,255,.78); border: 2px solid #4b2f27; border-radius: 11px; padding: 7px 11px; font-weight: 800; }
  .rank-row i { width: 18px; height: 18px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 7px; border: 2px solid rgba(0,0,0,.25); }
  .rank-player { min-width: 0; }
  .rank-name { display: block; }
  .rank-title { display: block; margin: 3px 0 0 25px; color: #9a5b34; font-size: 11px; line-height: 1.25; font-weight: 800; white-space: normal; }
  .rank-title.rare { color: #c17800; text-shadow: 0 1px #fff3b0; }
  .result-comment { width: 100%; text-align: center; border: 2px solid #d7a55d; border-radius: 13px; padding: 9px 12px; background: linear-gradient(145deg, #fffaf0, #ffe6b6); }
  .result-comment.rare { border-color: #f2a900; background: linear-gradient(120deg, #fff4ae, #ffd7a8, #fff4ae); }
  .result-comment strong { display: block; font-size: 18px; line-height: 1.25; }
  .result-comment span { display: block; margin-top: 3px; color: #825b45; font-size: 12px; font-weight: 700; line-height: 1.3; }
  #awards-hud { position: absolute; z-index: 30; top: 10px; left: 10px; width: min(310px, 42vw); max-height: calc(100vh - 150px); overflow-y: auto; pointer-events: auto; touch-action: pan-y; }
  #awards-hud .panel { padding: 12px; gap: 7px; align-items: stretch; }
  #awards-hud .panel h2 { font-size: 21px; }
  #awards-actions { display: flex; gap: 7px; pointer-events: auto; }
  #awards-actions .big-btn, #awards-actions .ghost-btn { flex: 1; padding: 8px 10px; font-size: 13px; letter-spacing: 0; white-space: nowrap; }
  #award-note { color: #8d6e63; text-align: center; text-shadow: none; }
  #mode-cards { display: flex; gap: 12px; }

  /* ---------- 触屏控件 ---------- */
  #touch-ui { position: absolute; inset: 0; pointer-events: none; }
  #touch-ui.movement-only #touch-btns { display: none; }
  #touch-zone {
    position: absolute; inset: 0 50% 0 0; pointer-events: auto; touch-action: none;
    --safe-left: env(safe-area-inset-left, 0px); --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  #joy {
    position: absolute; left: 0; top: 0;
    width: 118px; height: 118px; border-radius: 50%; background: rgba(255,248,236,.18);
    border: 3px solid rgba(255,248,236,.6); pointer-events: none; opacity: 0;
    transform: translate(-50%, -50%) scale(.72); transition: opacity .09s ease, transform .09s ease;
    box-shadow: inset 0 0 0 5px rgba(75,47,39,.12), 0 4px 12px rgba(0,0,0,.18);
  }
  #joy.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #joy-knob {
    position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(145deg, #fff8ec, #f4c974); border: 3px solid var(--ink); transform: translate(-50%,-50%);
    box-shadow: inset 0 -5px 0 rgba(150,91,44,.18), 0 3px 0 rgba(0,0,0,.25);
  }
  #touch-btns {
    position: absolute; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); right: calc(22px + env(safe-area-inset-right, 0px));
    display: flex; gap: 12px; align-items: flex-end; pointer-events: auto;
  }
  .t-btn {
    width: 70px; height: 70px; border-radius: 22px; border: 4px solid var(--ink); color: #4b2f27;
    background: linear-gradient(145deg, #fff8ec, #f3c971); font-family: inherit; font-weight: 900; font-size: 15px;
    box-shadow: inset 0 -7px 0 rgba(148,84,34,.16), 0 6px 0 #75452e, 0 9px 14px rgba(0,0,0,.25); touch-action: none;
    transition: filter .12s ease, opacity .12s ease, transform .08s ease, box-shadow .08s ease;
  }
  #btn-interact { width: 86px; height: 86px; border-radius: 29px; font-size: 17px; background: linear-gradient(145deg, #ffcf56, #f58b3c); color: #fff8ec; text-shadow: 0 2px 0 rgba(75,47,39,.45); }
  .t-btn.unavailable { opacity: .55; filter: saturate(.55); }
  .t-btn.available { animation: action-ready 1.1s ease-in-out infinite alternate; }
  .t-btn:active, .t-btn.on { background: var(--accent-2); transform: translateY(4px); box-shadow: inset 0 -3px 0 rgba(148,84,34,.15), 0 2px 0 #75452e; animation: none; }
  @keyframes action-ready { from { filter: brightness(1); } to { filter: brightness(1.12); } }

  /* ---------- 站台操作气泡 ---------- */
  #bubble {
    position: absolute; transform: translate(-50%, -100%); pointer-events: none;
    background: rgba(255, 248, 236, .96); border: 3px solid var(--ink); border-radius: 14px;
    padding: 7px 12px; box-shadow: 0 4px 0 rgba(0,0,0,.35); min-width: 90px; max-width: 240px;
    display: flex; flex-direction: column; gap: 4px; z-index: 5;
  }
  #bubble::after {
    content: ''; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid var(--ink);
  }
  .b-row { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800; line-height: 1.35; }
  .b-row kbd {
    font-family: inherit; font-size: 11px; font-weight: 900; background: var(--ink); color: #fff8ec;
    border-radius: 6px; padding: 1px 7px; flex: none;
  }
  .b-row.b-q kbd { background: var(--accent); }
  .b-info { color: #8d6e63; font-size: 12px; font-weight: 700; }
  .b-info.warn { color: #c62828; }

  /* ---------- Toast ---------- */
  #toasts {
    position: absolute; bottom: 26%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
  }
  .toast {
    background: rgba(62,39,35,.92); color: #fff8ec; font-weight: 800; font-size: 15px;
    border-radius: 12px; padding: 8px 18px; border: 2px solid rgba(255,248,236,.35);
    animation: toast-in .2s ease-out; white-space: nowrap;
  }
  .toast.good { background: rgba(46, 110, 50, .95); }
  .toast.bad { background: rgba(160, 40, 40, .95); }
  .toast.out { opacity: 0; transform: translateY(-12px); transition: all .35s; }
  @keyframes toast-in { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ---------- v2 餐牌式视觉语言 ---------- */
  .chip, .order-card, .panel, #bubble, .map-card, .p-row, .stat {
    border-color: #4b2f27;
    box-shadow: 0 4px 0 rgba(38,23,18,.42), inset 0 1px 0 rgba(255,255,255,.7);
  }
  .chip { background: linear-gradient(160deg, rgb(255 253 244 / var(--hud-surface-alpha)), rgb(255 232 190 / var(--hud-surface-alpha))); backdrop-filter: blur(2px); }
  .order-card {
    position: relative; overflow: hidden;
    background: linear-gradient(145deg, rgb(255 253 243 / var(--hud-surface-alpha)) 0 70%, rgb(244 227 198 / var(--hud-surface-alpha)) 100%);
    backdrop-filter: blur(2px);
  }
  .order-card::before { content: ''; position: absolute; inset: 0 0 auto; height: 3px; background: #f6a33c; }
  .o-main { display: flex; align-items: center; gap: 5px; }
  .o-type { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 9px; background: #ffe1a6; font-size: 17px; }
  .o-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 1px; line-height: 1; white-space: nowrap; }
  .order-card .o-name { overflow: hidden; color: #704633; font-size: 10px; font-weight: 800; text-overflow: ellipsis; }
  .order-card .o-points { flex: none; color: #a1603d; font-size: 9px; font-weight: 800; }
  .order-card .o-dots i { width: 22px; height: 20px; }
  .order-card.urgent { animation: order-shake .55s ease-in-out infinite alternate; background: rgb(255 240 233 / var(--hud-surface-alpha)); }
  @keyframes order-shake { from { transform: rotate(-.5deg); } to { transform: rotate(.5deg) scale(1.015); } }
  .overlay { background: radial-gradient(circle at 50% 30%, rgba(113,77,55,.5), rgba(26,18,25,.9)); }
  .panel {
    background:
      radial-gradient(circle at 15% 12%, rgba(255,255,255,.75) 0 2px, transparent 3px),
      linear-gradient(145deg, #fffdf4, #f6dfb9);
    background-size: 34px 34px, auto;
  }
  .panel h1, .panel h2 { color: #4b2f27; text-shadow: 0 2px 0 #fff; }
  .map-card { overflow: hidden; padding: 0 12px 12px; background: #fffaf0; }
  .map-card.sel { background: #fff7e5; box-shadow: 0 6px 0 rgba(0,0,0,.34), 0 0 0 3px rgba(255,183,66,.35); }
  .m-preview { height: 62px; margin: 0 -12px 9px; position: relative; overflow: hidden; background: #d79a66; border-bottom: 3px solid #4b2f27; }
  .m-preview i { position: absolute; width: 35px; height: 22px; bottom: 7px; border: 3px solid rgba(51,35,29,.65); transform: rotate(6deg); }
  .m-preview i:nth-child(1) { left: 12px; } .m-preview i:nth-child(2) { left: 60px; bottom: 17px; } .m-preview i:nth-child(3) { right: 10px; transform: rotate(-7deg); }
  .m-preview span { position: absolute; right: 9px; top: 3px; font-size: 25px; filter: drop-shadow(0 2px 0 rgba(0,0,0,.25)); }
  .theme-classic .m-preview { background: linear-gradient(#92c8d5 0 48%, #dda25b 49%); }
  .theme-classic .m-preview i { background: #f2d9a6; }
  .theme-split .m-preview { background: linear-gradient(#8edcff 0 48%, #bceade 49%); }
  .theme-split .m-preview i { background: #ffd85d; border-color: #4d83bd; }
  .theme-ring .m-preview { background: linear-gradient(#48caff 0 48%, #47ced7 49%); }
  .theme-ring .m-preview i { background: #77d9c9; border-color: #ff7b72; }
  .map-card .m-theme { display: inline-block; margin-top: 3px; padding: 2px 7px; border-radius: 999px; background: #f1dfc5; color: #815538; font-size: 10px; font-weight: 900; }
  .big-btn { background: linear-gradient(#ff875e, #ed5938); box-shadow: 0 6px 0 #963d2b; }
  #carry-chip { background: linear-gradient(150deg, rgb(255 251 220 / var(--hud-surface-alpha)), rgb(255 216 117 / var(--hud-surface-alpha))); }
  @media (max-width: 680px), (max-height: 560px) {
    .panel { padding: 16px; gap: 9px; }
    .map-card { width: 138px; }
    .m-preview { height: 46px; }
    .map-card .m-desc { display: none; }

      <h2>🔔 打烊结算</h2>
      <div id="end-stats"></div>
      <div id="end-btns">
        <button class="big-btn" id="rematch-btn">再来一局</button>
        <button class="ghost-btn" id="tolobby-btn">返回大厅</button>
      </div>
      <div class="note" id="end-note"></div>

</div>
