<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>胡闹厨房派对</title>
<style>
  :root {
    --ink: #3e2723;
    --paper: #fff8ec;
    --accent: #ff7043;
    --accent-2: #ffb300;
    --good: #66bb6a;
    --bad: #ef5350;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
    background: #2b1d16; color: var(--ink);
    user-select: none; -webkit-user-select: none;
  }
  #app { position: fixed; inset: 0; }
  #scene-host, #scene-host canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }
  .hidden { display: none !important; }

  /* ---------- HUD ---------- */
  #hud { position: absolute; inset: 0; pointer-events: none; }
  #hud-tl {
    position: absolute; top: calc(10px + env(safe-area-inset-top, 0px)); left: calc(10px + env(safe-area-inset-left, 0px));
    display: flex; flex-direction: column; gap: 6px;
  }
  .chip {
    background: rgba(255, 248, 236, 0.92); border: 3px solid var(--ink); border-radius: 14px;
    padding: 5px 14px; font-weight: 800; font-size: 17px; box-shadow: 0 3px 0 rgba(0,0,0,.35);
    display: inline-flex; align-items: center; gap: 8px; width: max-content;
  }
  #time-chip.low { color: var(--bad); animation: pulse .6s infinite alternate; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
  #hud-sub { display: flex; gap: 6px; }
  #hud-sub .chip { font-size: 12px; padding: 3px 10px; border-width: 2px; font-weight: 700; }

  #orders {
    position: absolute; top: calc(10px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; max-width: min(72vw, 640px); justify-content: center; flex-wrap: wrap;
  }
  .order-card {
    background: var(--paper); border: 3px solid var(--ink); border-radius: 14px;
    padding: 7px 11px 8px; min-width: 108px; box-shadow: 0 3px 0 rgba(0,0,0,.35);
    animation: pop-in .18s ease-out;
  }
  @keyframes pop-in { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .order-card .o-name { font-weight: 800; font-size: 14px; white-space: nowrap; }
  .order-card .o-dots { display: flex; gap: 3px; margin: 4px 0 5px; }
  .order-card .o-dots i { width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(0,0,0,.25); display: block; }
  .order-card .o-bar { height: 7px; border-radius: 4px; background: #e0d5c2; overflow: hidden; }
  .order-card .o-bar i { display: block; height: 100%; background: var(--good); border-radius: 4px; }
  .order-card.urgent { border-color: var(--bad); }
  .order-card.urgent .o-bar i { background: var(--bad); }

  #carry-chip {
    position: absolute; bottom: calc(14px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%);
    font-size: 15px;
  }
  #hint {
    position: absolute; bottom: calc(14px + env(safe-area-inset-bottom, 0px)); left: calc(10px + env(safe-area-inset-left, 0px));
    font-size: 12px; font-weight: 700; color: #fff8ec; text-shadow: 0 1px 3px rgba(0,0,0,.6);
    background: rgba(62,39,35,.55); padding: 6px 10px; border-radius: 10px; line-height: 1.6;
  }
  #audio-toggle {
    position: absolute; z-index: 20;
    top: calc(10px + env(safe-area-inset-top, 0px)); right: calc(10px + env(safe-area-inset-right, 0px));
    width: 44px; height: 44px; padding: 0; border: 3px solid var(--ink); border-radius: 14px;
    background: rgba(255, 248, 236, .94); box-shadow: 0 3px 0 rgba(0,0,0,.35);
    color: var(--ink); font-size: 21px; cursor: pointer; pointer-events: auto;
  }
  #audio-toggle:hover { transform: translateY(-2px); }
  #audio-toggle:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  #audio-toggle:focus-visible { outline: 3px solid var(--accent-2); outline-offset: 3px; }
  #audio-toggle.muted { opacity: .72; }

  /* ---------- 倒计时 ---------- */
  #countdown {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  #countdown span {
    font-size: clamp(90px, 22vw, 200px); font-weight: 900; color: #fff;
    text-shadow: 0 8px 0 rgba(0,0,0,.3), 0 0 40px rgba(255,150,50,.8);
    animation: cd-pop .9s ease-out infinite;
  }
  @keyframes cd-pop { 0% { transform: scale(1.6); opacity: 0; } 20% { transform: scale(1); opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }

  /* ---------- 覆盖层（大厅/结算） ---------- */
  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(43, 29, 22, .78); backdrop-filter: blur(6px); padding: 20px; overflow-y: auto;
  }
  .panel {
    background: var(--paper); border: 4px solid var(--ink); border-radius: 22px;
    box-shadow: 0 8px 0 rgba(0,0,0,.4); padding: 26px 30px; max-width: min(92vw, 620px); width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .panel h1 { margin: 0; font-size: clamp(26px, 5vw, 38px); font-weight: 900; letter-spacing: 2px; }
  .panel h1 .flame { color: var(--accent); }
  .panel h2 { margin: 0; font-size: 26px; font-weight: 900; }
  .sub { color: #8d6e63; font-weight: 700; font-size: 13px; margin-top: -8px; }

  #map-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .map-card {
    border: 3px solid var(--ink); border-radius: 16px; background: #fff; padding: 12px 14px;
    width: 160px; cursor: pointer; transition: transform .12s, box-shadow .12s; text-align: left;
    font-family: inherit;
  }
  .map-card:hover { transform: translateY(-3px); }
  .map-card.sel { background: #ffe0b2; box-shadow: 0 5px 0 rgba(0,0,0,.3); border-color: var(--accent); }
  .map-card.locked { cursor: default; opacity: .92; }
  .map-card .m-name { font-weight: 900; font-size: 16px; }
  .map-card .m-desc { font-size: 12px; color: #795548; margin-top: 5px; line-height: 1.5; }
  .map-card .m-ico { font-size: 24px; }

  #lobby-players { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 34px; }
  .p-row {
    display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 2px solid var(--ink);
    border-radius: 999px; padding: 5px 13px; font-weight: 800; font-size: 14px;
  }
  .p-row i { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(0,0,0,.25); display: block; }
  .p-row .crown { font-size: 12px; }

  .big-btn {
    font-family: inherit; font-size: 19px; font-weight: 900; letter-spacing: 3px;
    background: var(--accent); color: #fff; border: 3px solid var(--ink); border-radius: 16px;
    padding: 13px 44px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,.35); transition: transform .1s;
  }
  .big-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .big-btn:disabled { opacity: .45; cursor: not-allowed; }
  .ghost-btn {
    font-family: inherit; font-size: 15px; font-weight: 800; background: #fff; color: var(--ink);
    border: 3px solid var(--ink); border-radius: 14px; padding: 9px 26px; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,.3);
  }
  .note { font-size: 13px; font-weight: 700; color: #8d6e63; min-height: 18px; }

  #end-stats { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .stat {
    background: #fff; border: 3px solid var(--ink); border-radius: 14px; padding: 10px 18px; text-align: center;
  }
  .stat .v { font-size: 26px; font-weight: 900; }
  .stat .k { font-size: 12px; font-weight: 700; color: #8d6e63; }
  .stat.hero .v { color: var(--accent); font-size: 34px; }
  #end-btns { display: flex; gap: 12px; }

  /* ---------- 触屏控件 ---------- */
  #touch-ui { position: absolute; inset: 0; pointer-events: none; }
  #joy {
    position: absolute; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: calc(22px + env(safe-area-inset-left, 0px));
    width: 118px; height: 118px; border-radius: 50%; background: rgba(255,248,236,.18);
    border: 3px solid rgba(255,248,236,.5); pointer-events: auto; touch-action: none;
  }
  #joy-knob {
    position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,248,236,.85); border: 3px solid var(--ink); transform: translate(-50%,-50%);
  }
  #touch-btns {
    position: absolute; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); right: calc(22px + env(safe-area-inset-right, 0px));
    display: flex; gap: 14px; pointer-events: auto;
  }
  .t-btn {
    width: 74px; height: 74px; border-radius: 50%; border: 3px solid var(--ink);
    background: rgba(255,248,236,.88); font-family: inherit; font-weight: 900; font-size: 15px;
    box-shadow: 0 4px 0 rgba(0,0,0,.35); touch-action: none;
  }
  .t-btn:active, .t-btn.on { background: var(--accent-2); transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }

  /* ---------- 站台操作气泡 ---------- */
  #bubble {
    position: absolute; transform: translate(-50%, -100%); pointer-events: none;
    background: rgba(255, 248, 236, .96); border: 3px solid var(--ink); border-radius: 14px;
    padding: 7px 12px; box-shadow: 0 4px 0 rgba(0,0,0,.35); min-width: 90px; max-width: 240px;
    display: flex; flex-direction: column; gap: 4px; z-index: 5;
  }
  #bubble::after {
    content: ''; position: absolute; left: 50%; bottom: -10px; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 8px solid var(--ink);
  }
  .b-row { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800; line-height: 1.35; }
  .b-row kbd {
    font-family: inherit; font-size: 11px; font-weight: 900; background: var(--ink); color: #fff8ec;
    border-radius: 6px; padding: 1px 7px; flex: none;
  }
  .b-row.b-q kbd { background: var(--accent); }
  .b-info { color: #8d6e63; font-size: 12px; font-weight: 700; }
  .b-info.warn { color: #c62828; }

  /* ---------- Toast ---------- */
  #toasts {
    position: absolute; bottom: 26%; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
  }
  .toast {
    background: rgba(62,39,35,.92); color: #fff8ec; font-weight: 800; font-size: 15px;
    border-radius: 12px; padding: 8px 18px; border: 2px solid rgba(255,248,236,.35);
    animation: toast-in .2s ease-out; white-space: nowrap;
  }
  .toast.good { background: rgba(46, 110, 50, .95); }
  .toast.bad { background: rgba(160, 40, 40, .95); }
  .toast.out { opacity: 0; transform: translateY(-12px); transition: all .35s; }
  @keyframes toast-in { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <div id="scene-host"></div>
  <button id="audio-toggle" type="button" aria-label="关闭声音" aria-pressed="false" title="关闭声音">🔊</button>

  <div id="hud" class="hidden">
    <div id="hud-tl">
      <span class="chip" id="time-chip">⏱ <b id="time-val">3:00</b></span>
      <span class="chip" id="score-chip">⭐ <b id="score-val">0</b></span>
      <div id="hud-sub">
        <span class="chip">上菜 <b id="served-val">0</b></span>
        <span class="chip">超时 <b id="expired-val">0</b></span>
      </div>
    </div>
    <div id="orders"></div>
    <span class="chip hidden" id="carry-chip"></span>
    <div id="hint"></div>
  </div>

  <div id="countdown" class="hidden"><span id="countdown-num">3</span></div>

  <div id="lobby" class="overlay">
    <div class="panel">
      <h1>胡闹<span class="flame">厨房</span>派对</h1>
      <div class="sub">2-4 人合作 · 切菜 · 煮汤 · 装盘 · 上菜 · 洗碗</div>
      <div id="map-cards"></div>
      <div id="lobby-players"></div>
      <button class="big-btn" id="start-btn">开火！</button>
      <div class="note" id="lobby-note"></div>
    </div>
  </div>

  <div id="ended" class="overlay hidden">
    <div class="panel">
      <h2>🔔 打烊结算</h2>
      <div id="end-stats"></div>
      <div id="end-btns">
        <button class="big-btn" id="rematch-btn">再来一局</button>
        <button class="ghost-btn" id="tolobby-btn">返回大厅</button>
      </div>
      <div class="note" id="end-note"></div>
    </div>
  </div>

  <div id="touch-ui" class="hidden">
    <div id="joy"><div id="joy-knob"></div></div>
    <div id="touch-btns">
      <button class="t-btn" id="btn-work">切/洗</button>
      <button class="t-btn" id="btn-interact">互动</button>
    </div>
  </div>

  <div id="bubble" class="hidden">
    <div class="b-row b-e" id="bubble-e"><kbd>E</kbd><span></span></div>
    <div class="b-row b-q" id="bubble-q"><kbd>Q</kbd><span></span></div>
    <div class="b-row b-info" id="bubble-info"><span></span></div>
  </div>

  <div id="toasts"></div>
</div>
<script type="module" src="/src/client/main.js"></script>
</body>
</html>
