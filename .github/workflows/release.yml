name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and republish
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false
      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          test "$(node -p "require('./package.json').version")" = "${RELEASE_TAG#v}"
          test "$(node -p "require('./public/parti.room.json').version")" = "${RELEASE_TAG#v}"
      - run: npm install
      - run: npm run build
      - run: npm run verify
      - name: Validate room package
        run: |
          test -f dist/parti.room.json
          test -f dist/index.html
          test -f dist/room.worker.js
          test "$(find dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 4
      - name: Package parti.room.zip
        working-directory: dist
        run: zip -r "$GITHUB_WORKSPACE/parti.room.zip" .
      - name: Create or update release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/parti.room.json parti.room.json
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" parti.room.zip parti.room.json --clobber
          else
            gh release create "$RELEASE_TAG" parti.room.zip parti.room.json \
              --title "$RELEASE_TAG" --generate-notes
          fi
      - name: Publish dist/ to the parti-package branch
        run: |
          publish_dir="$(mktemp -d)"
          cp -R dist/. "$publish_dir/"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan parti-package-publish
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx
          cp -R "$publish_dir/." .
          git add -A
          git commit -m "parti package $RELEASE_TAG"
          git push -f origin HEAD:parti-package
